
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Signature</title>
</head>
<body>

    <!-- Email signature table -->
    <table border="0" cellpadding="0" cellspacing="0" width="600">

        <!-- Logo row -->
        <tr>
            <td>
                <!-- Nested table for name and role alignment -->
                <table border="0" cellpadding="0" cellspacing="0">
                    <tr>
                        <td>
                            <!-- Profile pic with adjusted width and height attributes -->
                            <img src="./pic/profile-pic.png" alt="Profile Pic" width="100" height="100">
                        </td>
                        <td valign="right" style="padding-left: 15px;">
                            <!-- Name and role row -->
                            <strong>Soikat Dev</strong>
                            <br>
                            <em>Analytics Engineer, ujet.cx</em>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- Address and contact row -->
        <tr>
            <td height="60">
                <!-- Address image -->
                <img src="./pic/location.png" alt="Address Icon" width="20" height="20">
                <b>Uttara-27 Apartment-Uttara Housing Society, Oxygen,Chattogram,Bangladesh</b>
                <br>
                <!-- Phone image -->
                <img src="./pic/phone.png" alt="Phone Icon" width="20" height="20"> <b>Office (+88)01682024792</b>
            </td>
        </tr>

        <!-- Email and website row -->
        <tr>
            <td height="60">
                <!-- Email image -->
                <img src="./pic/mail.png" alt="Email Icon" width="20" height="20">
                <a href="mailto:Soikat.pciu.cse19@gmail.com">Soikat.pciu.cse19@gmail.com</a>
                <br>
                <!-- Website image -->
                <img src="./pic/website.png" alt="Website Icon" width="20" height="20">
                <a href="https://www.soikat.com/" target="_blank">soikatdev.com</a>
            </td>
        </tr>

        <!-- Social media icons row -->
        <tr>
            <td height="60">
                <!-- Facebook Icon -->
                <a href="https://www.facebook.com/saikat.dev.77" target="_blank"><img src="./pic/facebook.png" alt="Facebook Icon" width="30" height="30"></a>
                <!-- LinkedIn Icon -->
                <a href="https://www.linkedin.com/in/soikat-dev/" target="_blank"><img src="./pic/linkedin.png" alt="LinkedIn Icon" width="30" height="30"></a>
                <!-- Twitter Icon -->
                <a href="https://twitter.com/Aupee9" target="_blank"><img src="./pic/twitter.png" alt="Twitter Icon" width="30" height="30"></a>
            </td>
        </tr>

    </table>

</body>
</html>
